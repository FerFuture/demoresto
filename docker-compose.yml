services:
  restobot:
    build: .
    container_name: restobot-whatsapp
    restart: always
    env_file:
      - .env
    ports:
      - "3001:3000"
    volumes:
      - ./.wwebjs_auth:/app/.wwebjs_auth
      - ./tmp_audio:/app/tmp_audio

  dashboard:
    build: ./dashboard
    container_name: restobot-dashboard
    restart: always
    ports:
      - "5173:5173"
    volumes:
      - ./dashboard:/app
      # node_modules en volumen aparte: el entrypoint del dashboard ejecuta npm install al iniciar.
      - /app/node_modules
      - ./.env:/app/.env:ro
